name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: legaltech
          POSTGRES_USER: legaltech
          POSTGRES_PASSWORD: legaltech_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U legaltech -d legaltech"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://legaltech:legaltech_dev@localhost:5432/legaltech
      APP_ENV: test
      AUTH_PROVIDER: dev_jwt
      DEV_JWT_ENABLED: "true"
      DEV_JWT_SECRET: fictitious-local-dev-secret-32-bytes-minimum
      EMAIL_BACKEND: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run migrations
        run: alembic upgrade head
      - name: Seed example organization
        run: psql "postgresql://legaltech:legaltech_dev@localhost:5432/legaltech" -f ../../database/local/seed_example_organization.sql
      - name: Seed roles/permissions
        run: >-
          python -m src.modules.admin.seed_roles_permissions
          --organization-id 11111111-1111-4111-8111-111111111111
          --actor-user-id 22222222-2222-4222-8222-222222222222
      # Bloqueante: suite verde (249 testes) confirmada em CI run #25 e em container com Postgres real.
      - name: Run tests
        run: python -m unittest discover -s tests -v

  frontend:
    name: Frontend (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      # Bloqueante: suite verde (79 testes) confirmada em CI run #25.
      - name: Tests
        run: npm test

  image:
    name: Backend image (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Valida que o Dockerfile de producao (DEPLOY-01) builda. Push para ECR fica na FASE 8.
      - name: Build API image
        run: docker build -t legaltech-api:ci apps/api
